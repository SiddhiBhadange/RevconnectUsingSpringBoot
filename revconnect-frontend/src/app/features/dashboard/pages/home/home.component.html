<div class="feed-container">

  <h2>Feed</h2>

  <!-- ================= CREATE POST ================= -->
  <div class="create-post">

    <textarea
      [(ngModel)]="newPost"
      placeholder="What's on your mind? Use #hashtags"
      rows="3">
    </textarea>

    <!-- Upload Photo -->
    <input type="file" (change)="onImageSelected($event)" />

    <button (click)="createPost()" [disabled]="!newPost.trim()">
      Post
    </button>

  </div>

  <hr>

  <!-- ================= POSTS ================= -->
  <div *ngFor="let post of posts" class="post-card">

    <div class="post-header">
      <h4 [routerLink]="['/dashboard/profile', post.userId]" class="profile-link">
        {{ post.username }}
      </h4>

      <!-- DELETE POST -->
      <button *ngIf="post.isOwner"
              class="delete-btn"
              (click)="deletePost(post)">
        Delete
      </button>
    </div>

    <!-- Content with hashtags -->
    <p [innerHTML]="formatContent(post.content)"></p>

    <!-- Show Image -->
    <img *ngIf="post.imageUrl"
         [src]="post.imageUrl"
         class="post-image" />

    <small>{{ post.createdAt | date:'short' }}</small>

    <!-- ACTIONS -->
    <div class="post-actions">

      <!-- LIKE -->
      <div class="action-item"
           (click)="toggleLike(post)"
           [class.liked]="post.likedByCurrentUser">

        <mat-icon>
          {{ post.likedByCurrentUser ? 'favorite' : 'favorite_border' }}
        </mat-icon>

        <span>{{ post.likeCount }}</span>
      </div>

      <!-- COMMENT -->
      <div class="action-item"
           (click)="toggleComments(post)">
        <mat-icon>chat_bubble_outline</mat-icon>
        <span>{{ post.commentCount }}</span>
      </div>

    </div>

    <!-- COMMENTS -->
    <div *ngIf="post.showComments" class="comment-section">

      <div *ngFor="let comment of post.comments" class="comment-item">

        <div class="comment-header">
          <strong>{{ comment.username }}</strong>

          <!-- DELETE COMMENT -->
          <button *ngIf="comment.isOwner"
                  class="delete-comment-btn"
                  (click)="deleteComment(post, comment)">
            ✕
          </button>
        </div>

        <p>{{ comment.content }}</p>
      </div>

      <input
        [(ngModel)]="post.newComment"
        placeholder="Write a comment..." />

      <button (click)="addComment(post)"
              [disabled]="!post.newComment?.trim()">
        Comment
      </button>

    </div>

  </div>

</div>

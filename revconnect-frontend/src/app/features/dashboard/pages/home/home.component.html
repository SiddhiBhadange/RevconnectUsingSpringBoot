<div class="feed-container">

  <h2>Feed</h2>

  <!-- Create Post -->
  <div class="create-post">
    <textarea [(ngModel)]="newPost" placeholder="What's on your mind?"></textarea>
    <button (click)="createPost()">Post</button>
  </div>

  <hr>

  <!-- Show Posts -->
  <div *ngFor="let post of posts" class="post-card">
  <h4 [routerLink]="['/dashboard/profile', post.userId]" class="profile-link">
  {{ post.username }}
</h4>
    <p>{{ post.content }}</p>

    <small>{{ post.createdAt | date:'short' }}</small>

 <div class="post-actions">

  <!-- LIKE -->
  <div class="action-item"
       (click)="toggleLike(post)"
       [class.liked]="post.likedByCurrentUser">

    <mat-icon class="action-icon">
      {{ post.likedByCurrentUser ? 'favorite' : 'favorite_border' }}
    </mat-icon>

    <span>{{ post.likeCount }}</span>
  </div>

  <!-- COMMENT -->
  <div class="action-item">
    <mat-icon class="action-icon">chat_bubble_outline</mat-icon>
    <span>{{ post.commentCount }}</span>
  </div>

</div>
     <!-- Comment Section -->
  <div class="comment-section">

    <button   class="comment-toggle-btn" (click)="toggleComments(post)">
      View Comments
    </button>

    <div *ngIf="post.showComments">

      <div *ngFor="let comment of post.comments" class="comment-item">
        <strong>{{ comment.username }}</strong>
        <p>{{ comment.content }}</p>
      </div>

      <input 
  class="comment-input"
  [(ngModel)]="post.newComment"
  placeholder="Write a comment..." />
      <button class="comment-submit-btn" (click)="addComment(post)">
        Comment
      </button>
 </div>
  </div>
  </div>

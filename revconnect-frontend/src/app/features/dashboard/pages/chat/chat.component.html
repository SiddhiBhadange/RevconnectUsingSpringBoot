<div class="chat-container">

  <div class="messages">
    <div *ngFor="let msg of messages"
         [class.me]="msg.sender.id === currentUser?.id"
         class="message">
      {{ msg.content }}
    </div>
  </div>

  <div class="input-box">
    <input [(ngModel)]="newMessage"
           placeholder="Type message..." />
    <button (click)="sendMessage()">Send</button>
  </div>

</div>

<div class="notifications-container">

  <h2>Notifications</h2>

  <div *ngIf="notifications.length === 0">
    No notifications yet.
  </div>

  <div class="notification-card"
       *ngFor="let n of notifications"
       [class.unread]="!n.read">

    <div class="message">
      {{ n.message }}
    </div>

    <div class="time">
      {{ n.createdAt | date:'medium' }}
    </div>

    <button *ngIf="!n.read"
            (click)="markAsRead(n.id)">
      Mark as read
    </button>

  </div>

</div>

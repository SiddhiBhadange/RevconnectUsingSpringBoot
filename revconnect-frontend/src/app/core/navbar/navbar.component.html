<mat-toolbar color="primary">

  <span routerLink="/" class="logo">RevConnect</span>
  <span class="spacer"></span>

  <!-- Search Link for Logged In Users -->
<a *ngIf="isLoggedIn" mat-button routerLink="/search">
  <mat-icon>search</mat-icon>
  Search Users
</a>

  <!-- If NOT Logged In -->
  <ng-container *ngIf="!isLoggedIn; else guest">
    <a mat-button routerLink="/auth/login">Login</a>
    <a mat-button routerLink="/auth/register">Register</a>
  </ng-container>

  <!-- If Logged In -->
  <ng-template #guest>
    <a mat-button routerLink="/dashboard">Dashboard</a>
    <a mat-button routerLink="/dashboard/profile">Profile</a>
     <!-- Notification Icon -->
    <div class="notification-icon" (click)="router.navigate(['/notifications'])">
      <mat-icon>notifications</mat-icon>
      <span *ngIf="unreadCount > 0" class="badge">
        {{ unreadCount }}
      </span>
    </div>
    <li>
  <a mat-button routerLink="/analytics" routerLinkActive="active">
    📊 Analytics
  </a>
</li>
    <a mat-button (click)="logout()">Logout</a>

   
  </ng-template>

</mat-toolbar>
